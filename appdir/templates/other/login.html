{% extends 'base.html' %}
{% block title %}登录 - 杆塔倾斜检测{% endblock %}
{% block nav_active %}nav-account{% endblock %}
{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-sidebar">
            <h2>欢迎回来</h2>
            <p>永远面朝阳光——阴影就会落在你身后。</p>
            <p style="margin-top:var(--space-xl);opacity:0.7;">
                <i class="bi bi-lightning-charge-fill"></i> 杆塔倾斜检测系统
            </p>
        </div>
        <div class="auth-form">
            <h3>登录</h3>
            <p class="auth-subtitle">请登录您的账户以继续</p>

            <div class="flash-messages">
                {% for message in get_flashed_messages() %}
                <div class="flash-msg flash-error">
                    <i class="bi bi-exclamation-circle"></i> {{ message }}
                </div>
                {% endfor %}
            </div>

            <form action="/login" method="post" novalidate>
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label class="form-label" for="username">个人账户</label>
                    <input class="form-input" id="username" name="username" placeholder="请输入您的账号" type="text">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input class="form-input" id="password" name="password" placeholder="请输入您的密码" type="password">
                </div>
                <div class="form-group">
                    <button class="btn btn-primary btn-lg" style="width:100%;" type="submit">登录</button>
                </div>
            </form>

            <div class="auth-link">
                还没有账号？<a href="/register">创建账户</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
