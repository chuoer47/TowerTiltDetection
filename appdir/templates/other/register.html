{% extends 'base.html' %}
{% block title %}注册 - 杆塔倾斜检测{% endblock %}
{% block nav_active %}nav-account{% endblock %}
{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-sidebar">
            <h2>欢迎加入</h2>
            <p>创建您的账户，开始使用杆塔倾斜检测系统。</p>
            <p style="margin-top:var(--space-xl);opacity:0.7;">
                <i class="bi bi-lightning-charge-fill"></i> 杆塔倾斜检测系统
            </p>
        </div>
        <div class="auth-form">
            <h3>注册</h3>
            <p class="auth-subtitle">请填写以下信息创建账户</p>

            <div class="flash-messages">
                {% for message in get_flashed_messages() %}
                <div class="flash-msg flash-error">
                    <i class="bi bi-exclamation-circle"></i> {{ message }}
                </div>
                {% endfor %}
            </div>

            <form action="/register" method="post" novalidate>
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label class="form-label" for="username">账号</label>
                    <input class="form-input" id="username" name="username" placeholder="在此输入账号" type="text">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input class="form-input" id="password" name="password" placeholder="在此输入密码" type="password">
                </div>
                <div class="form-group">
                    <label class="form-label" for="repassword">确认密码</label>
                    <input class="form-input" id="repassword" name="repassword" placeholder="在此再次输入密码" type="password">
                </div>
                <div class="form-group">
                    <button class="btn btn-primary btn-lg" style="width:100%;" type="submit">注册</button>
                </div>
            </form>

            <div class="auth-link">
                已有账号？<a href="/login">去登录</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
