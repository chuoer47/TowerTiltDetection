{% extends 'base.html' %}
{% block nav_active %}nav-tower{% endblock %}
{% block content %}

<div class="page-header">
    <div class="page-container">
        <ul class="breadcrumb">
            <li><a href="/towerCenter">杆塔中心</a></li>
            <li class="breadcrumb-sep">/</li>
            <li>{% block form_title %}表单{% endblock %}</li>
        </ul>
    </div>
</div>

<div class="page-container" style="max-width:720px;">
    <div class="card card-elevated">
        <div class="card-body" style="padding:var(--space-xl);">
            <div class="flash-messages">
                {% for message in get_flashed_messages() %}
                <div class="flash-msg flash-{{ 'error' if 'error' in message else 'success' }}">
                    <i class="bi bi-{{ 'exclamation-circle' if 'error' in message else 'check-circle' }}"></i> {{ message }}
                </div>
                {% endfor %}
            </div>
            {% block form %}{% endblock %}
        </div>
    </div>
</div>

{% endblock %}
