{% extends 'TowerTiltCenter/formBase.html' %}
{% block title %}添加杆塔 - 杆塔倾斜检测{% endblock %}
{% block form_title %}添加杆塔{% endblock %}
{% block form %}

<h3 style="margin-bottom:var(--space-sm);">添加新杆塔</h3>
<p class="text-sm" style="margin-bottom:var(--space-xl);">填写杆塔的基本信息</p>

<form action="/addTower" method="post" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
        <label class="form-label" for="name">杆塔名称</label>
        <input class="form-input" id="name" name="name" placeholder="输入杆塔名字" type="text"
               {% if name %}value="{{ name }}" readonly{% endif %}>
    </div>
    <div class="form-group">
        <label class="form-label" for="description">杆塔描述</label>
        <textarea class="form-textarea" id="description" name="description" rows="4"
                  placeholder="输入杆塔描述信息（位置、特征等）"
                  {% if description %}readonly{% endif %}>{{ description }}</textarea>
    </div>
    <div style="display:flex;gap:var(--space-md);justify-content:flex-end;">
        <button class="btn btn-outline" type="button" onclick="this.closest('form').reset();">清空</button>
        <button class="btn btn-primary" type="submit">
            <i class="bi bi-plus-lg"></i> 添加杆塔
        </button>
    </div>
</form>

{% endblock %}
