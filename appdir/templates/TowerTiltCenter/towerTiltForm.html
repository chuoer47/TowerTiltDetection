{% extends 'TowerTiltCenter/formBase.html' %}
{% block title %}杆塔倾斜测量 - 杆塔倾斜检测{% endblock %}
{% block form_title %}倾斜度测量{% endblock %}
{% block form %}

<h3 style="margin-bottom:var(--space-sm);">杆塔倾斜度测量</h3>
<p class="text-sm" style="margin-bottom:var(--space-xl);">请填写杆塔上下各 4 个方向的三维坐标（经度 纬度 高度，空格分隔）</p>

<form action="/towerTiltForm/{{ towerId }}" method="post" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label class="form-label" for="towerId">杆塔 ID</label>
        <input class="form-input" type="text" id="towerId" name="towerId"
               placeholder="输入杆塔 ID"
               {% if towerId %}value="{{ towerId }}" readonly{% endif %}>
    </div>

    <h4 style="margin-top:var(--space-xl);margin-bottom:var(--space-md);color:var(--color-primary);">
        <i class="bi bi-arrow-up-circle"></i> 上部测量点
    </h4>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md);">
        <div class="form-group">
            <label class="form-label" for="towerUpperE">东 (E)</label>
            <input class="form-input" type="text" id="towerUpperE" name="towerUpperE"
                   placeholder="经度 纬度 高度"
                   {% if towerUpperE %}value="{{ towerUpperE }}" readonly{% endif %}>
        </div>
        <div class="form-group">
            <label class="form-label" for="towerUpperS">南 (S)</label>
            <input class="form-input" type="text" id="towerUpperS" name="towerUpperS"
                   placeholder="经度 纬度 高度"
                   {% if towerUpperS %}value="{{ towerUpperS }}" readonly{% endif %}>
        </div>
        <div class="form-group">
            <label class="form-label" for="towerUpperW">西 (W)</label>
            <input class="form-input" type="text" id="towerUpperW" name="towerUpperW"
                   placeholder="经度 纬度 高度"
                   {% if towerUpperW %}value="{{ towerUpperW }}" readonly{% endif %}>
        </div>
        <div class="form-group">
            <label class="form-label" for="towerUpperN">北 (N)</label>
            <input class="form-input" type="text" id="towerUpperN" name="towerUpperN"
                   placeholder="经度 纬度 高度"
                   {% if towerUpperN %}value="{{ towerUpperN }}" readonly{% endif %}>
        </div>
    </div>

    <h4 style="margin-top:var(--space-xl);margin-bottom:var(--space-md);color:var(--color-primary);">
        <i class="bi bi-arrow-down-circle"></i> 下部测量点
    </h4>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md);">
        <div class="form-group">
            <label class="form-label" for="towerBottomE">东 (E)</label>
            <input class="form-input" type="text" id="towerBottomE" name="towerBottomE"
                   placeholder="经度 纬度 高度"
                   {% if towerBottomE %}value="{{ towerBottomE }}" readonly{% endif %}>
        </div>
        <div class="form-group">
            <label class="form-label" for="towerBottomS">南 (S)</label>
            <input class="form-input" type="text" id="towerBottomS" name="towerBottomS"
                   placeholder="经度 纬度 高度"
                   {% if towerBottomS %}value="{{ towerBottomS }}" readonly{% endif %}>
        </div>
        <div class="form-group">
            <label class="form-label" for="towerBottomW">西 (W)</label>
            <input class="form-input" type="text" id="towerBottomW" name="towerBottomW"
                   placeholder="经度 纬度 高度"
                   {% if towerBottomW %}value="{{ towerBottomW }}" readonly{% endif %}>
        </div>
        <div class="form-group">
            <label class="form-label" for="towerBottomN">北 (N)</label>
            <input class="form-input" type="text" id="towerBottomN" name="towerBottomN"
                   placeholder="经度 纬度 高度"
                   {% if towerBottomN %}value="{{ towerBottomN }}" readonly{% endif %}>
        </div>
    </div>

    <div style="display:flex;gap:var(--space-md);justify-content:flex-end;margin-top:var(--space-xl);">
        <button class="btn btn-outline" type="button" onclick="this.closest('form').reset();">清空</button>
        <button class="btn btn-primary" type="submit">
            <i class="bi bi-calculator"></i> 提交计算
        </button>
    </div>
</form>

{% endblock %}
