{% extends 'base.html' %}
{% block title %}项目信息 - 杆塔倾斜检测{% endblock %}
{% block nav_active %}nav-info{% endblock %}
{% block content %}

<div class="page-header">
    <div class="page-container">
        <h1><i class="bi bi-journal-text"></i> 项目信息</h1>
        <p class="subtitle">了解杆塔倾斜检测项目的研究内容与技术方案</p>
    </div>
</div>

<div class="page-container">
    <div class="forum-list">
        {% for article in articles %}
        <div class="forum-card">
            <div style="display:flex;align-items:center;justify-content:space-between;">
                <div>
                    <div class="forum-title">{{ article.title }}</div>
                    <p style="margin:0;font-size:0.9rem;color:var(--color-text-secondary);text-indent:0;">
                        点击查看详细内容
                    </p>
                </div>
                <a class="btn btn-outline btn-sm" href="/article/{{ article.id }}">
                    <i class="bi bi-arrow-right"></i> 查看文章
                </a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
