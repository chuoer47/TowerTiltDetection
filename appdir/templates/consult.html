{% extends 'base.html' %}
{% block title %}咨询 - 杆塔倾斜检测{% endblock %}
{% block nav_active %}nav-consult{% endblock %}
{% block content %}

<div class="page-header">
    <div class="page-container">
        <h1><i class="bi bi-chat-dots"></i> 咨询</h1>
        <p class="subtitle">如有任何关于杆塔倾斜的问题，请在此提交咨询</p>
    </div>
</div>

<div class="page-container" style="max-width:720px;">
    <div class="card card-elevated">
        <div class="card-body" style="padding:var(--space-xl);">
            <div class="flash-messages">
                {% for message in get_flashed_messages() %}
                <div class="flash-msg flash-success">
                    <i class="bi bi-check-circle"></i> {{ message }}
                </div>
                {% endfor %}
                {% if message %}
                <div class="flash-msg flash-success">
                    <i class="bi bi-check-circle"></i> {{ message }}
                </div>
                {% endif %}
            </div>

            <form action="/consult" method="post" novalidate>
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label class="form-label" for="title">标题</label>
                    <input class="form-input" type="text" id="title" name="title"
                           placeholder="例如：杆塔为什么会倾斜？"
                           {% if title %}value="{{ title }}"{% endif %}
                           {% if title %}readonly{% endif %}>
                </div>
                <div class="form-group">
                    <label class="form-label" for="question">详细描述</label>
                    <textarea class="form-textarea" id="question" name="question" rows="6"
                              placeholder="请详细描述您的问题…"
                              {% if question %}readonly{% endif %}>{{ question }}</textarea>
                </div>
                <div style="display:flex;gap:var(--space-md);justify-content:flex-end;">
                    <button class="btn btn-outline" type="button" onclick="document.getElementById('question').form.reset();">清空</button>
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-send"></i> 提交咨询
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
